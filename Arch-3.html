<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ARCH-3</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
background:#050505;
color:white;
font-family:Montserrat;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at top right,rgba(200,160,70,.12),transparent 38%),
#070707;
}

header{
height:62px;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 22px;
border-bottom:1px solid rgba(210,174,91,.25);
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #d1ad5e;
border-radius:50%;
color:#d8b568;
font-family:Cinzel;
}

.name{
color:#d8b568;
font-family:Cinzel;
letter-spacing:2px;
font-size:16px;
}

.sub{
color:#777;
font-size:7px;
letter-spacing:1px;
}

.status{
color:#d8b568;
font-size:8px;
}

.status span{
display:inline-block;
width:7px;
height:7px;
border-radius:50%;
background:#c8a653;
margin-right:5px;
}

.chat{
flex:1;
min-height:0;
overflow-y:auto;
overflow-x:hidden;
padding:20px;
scrollbar-width:none;
-ms-overflow-style:none;
}

.chat::-webkit-scrollbar{
display:none;
}

.msg{
width:100%;
max-width:1200px;
margin:0 auto 15px;
display:flex;
gap:8px;
}

.ai{
justify-content:flex-start;
}

.user{
justify-content:flex-end;
}

.avatar{
width:30px;
height:30px;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #c8a653;
border-radius:50%;
color:#d8b568;
font-family:Cinzel;
}

.bubble{
max-width:100%;
padding:13px;
border-radius:15px;
font-size:11px;
line-height:1.5;
overflow-wrap:anywhere;
}

.ai .bubble{
width:100%;
background:#111;
border:1px solid rgba(205,177,109,.2);
border-top-left-radius:4px;
}

.user .bubble{
max-width:420px;
background:linear-gradient(135deg,#a8833d,#d8b568);
color:#080808;
border-top-right-radius:4px;
}

.commands{
display:grid;
grid-template-columns:1fr;
gap:8px;
margin-top:12px;
}

.commands button{
height:42px;
border:1px solid rgba(205,177,109,.3);
border-radius:8px;
background:#151515;
color:#d8b568;
font-size:10px;
cursor:pointer;
}

.commands button:hover{
background:#d8b568;
color:#080808;
}

.watch-card{
margin-top:12px;
border:1px solid rgba(205,177,109,.3);
border-radius:10px;
overflow:hidden;
background:#0d0d0d;
}

.watch-title{
padding:14px;
color:#d8b568;
font-family:Cinzel;
font-size:11px;
letter-spacing:1px;
border-bottom:1px solid rgba(205,177,109,.2);
}

.row{
display:grid;
grid-template-columns:30% 70%;
gap:15px;
padding:10px 14px;
border-bottom:1px solid rgba(255,255,255,.06);
}

.row:last-child{
border-bottom:0;
}

.key{
color:#888;
font-size:9px;
text-transform:uppercase;
}

.value{
color:#dfc477;
font-size:10px;
overflow-wrap:anywhere;
word-break:break-word;
}

.input-area{
flex-shrink:0;
padding:9px 20px 15px;
border-top:1px solid rgba(210,174,91,.2);
}

.input-box{
max-width:1200px;
margin:auto;
display:flex;
gap:8px;
padding:6px 7px 6px 15px;
border:1px solid rgba(210,174,91,.35);
border-radius:28px;
background:#121212;
}

input{
flex:1;
min-width:0;
border:0;
outline:0;
background:transparent;
color:white;
font-size:12px;
font-family:Montserrat;
}

.send{
width:38px;
height:38px;
border:0;
border-radius:50%;
background:linear-gradient(135deg,#a8833d,#d8b568);
cursor:pointer;
}

#lock{
position:fixed;
inset:0;
z-index:99;
display:flex;
align-items:center;
justify-content:center;
background:#050505;
}

.lock-card{
width:380px;
padding:30px 24px;
text-align:center;
border:1px solid rgba(205,177,109,.35);
border-radius:18px;
background:#0c0c0c;
}

.lock-card .logo{
margin:auto;
width:60px;
height:60px;
font-size:21px;
}

.lock-card h1{
margin-top:15px;
color:#d8b568;
font-family:Cinzel;
letter-spacing:3px;
}

.lock-card p{
margin:7px 0 22px;
font-size:8px;
color:#777;
}

.lock-card input{
width:100%;
height:44px;
padding:0 13px;
border:1px solid rgba(205,177,109,.3);
border-radius:8px;
background:#151515;
color:white;
}

.lock-card button{
width:100%;
height:44px;
margin-top:11px;
border:0;
border-radius:8px;
background:linear-gradient(135deg,#a8833d,#d8b568);
font-weight:bold;
cursor:pointer;
}

#error{
margin-top:10px;
color:#c86d6d;
font-size:9px;
min-height:15px;
}
</style>
</head>

<body>

<div id="lock">

<div class="lock-card">

<div class="logo">3</div>

<h1>ARCH-3</h1>

<p>WATCH REGISTRY AGENT</p>

<input id="password" type="password" placeholder="ENTER PASSWORD">

<button onclick="unlock()">UNLOCK ARCH-3</button>

<div id="error"></div>

</div>

</div>

<div class="app">

<header>

<div class="brand">

<div class="logo">3</div>

<div>

<div class="name">ARCH-3</div>

<div class="sub">WATCH REGISTRY AGENT</div>

</div>

</div>

<div class="status">
<span></span>LIVE REGISTRY SYNC
</div>

</header>

<main id="chat" class="chat">

<div class="msg ai">

<div class="avatar">3</div>

<div class="bubble">

<b style="color:#d8b568">
ARCH-3 WATCH COMMAND
</b>

<div class="commands">

<button onclick="quick()">
WATCH DETAIL
</button>

</div>

</div>

</div>

</main>

<div class="input-area">

<div class="input-box">

<input id="input" placeholder="Watch code ya command likho...">

<button class="send" onclick="send()">➤</button>

</div>

</div>

</div>

<script>

const PASSWORD="myvershu12";

function unlock(){

if(document.getElementById("password").value===PASSWORD){

document.getElementById("lock").style.display="none";

}else{

document.getElementById("error").innerText="ACCESS DENIED";

}

}

const watchFirebaseConfig={

apiKey:"AIzaSyAIGI79RWnrUtaRNhFU8YWBjGINWiZ1Eew",

authDomain:"cm-smm-panel.firebaseapp.com",

databaseURL:"https://cm-smm-panel-default-rtdb.firebaseio.com",

projectId:"cm-smm-panel",

storageBucket:"cm-smm-panel.firebasestorage.app",

messagingSenderId:"805393568681",

appId:"1:805393568681:web:e10454a61e17b394082ab8"

};

firebase.initializeApp(watchFirebaseConfig);

const db=firebase.database();

let watches={};

db.ref("watches").on("value",s=>{

watches=s.val()||{};

});

function esc(v){

return String(v??"N/A")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;");

}

function addUser(text){

let d=document.createElement("div");

d.className="msg user";

d.innerHTML=`<div class="bubble">${esc(text)}</div>`;

chat.appendChild(d);

scroll();

}

function addAI(text,html=""){

let d=document.createElement("div");

d.className="msg ai";

d.innerHTML=`

<div class="avatar">3</div>

<div class="bubble">

${esc(text)}

${html}

</div>

`;

chat.appendChild(d);

scroll();

}

function scroll(){

chat.scrollTop=chat.scrollHeight;

}

function quick(){

let input=document.getElementById("input");

let code=input.value.trim();

if(!code){

input.focus();

return;

}

input.value=code+" detail";

input.focus();

}

function showWatch(code){

code=code.trim();

let exact=Object.keys(watches).find(

x=>x.toLowerCase()===code.toLowerCase()

);

if(exact)code=exact;

let watch=watches[code];

if(!watch){

addAI(

"Watch code "+code+" registry me nahi mila."

);

return;

}

let html="";

Object.keys(watch).forEach(k=>{

let v=watch[k];

if(v!==null&&typeof v==="object"){

v=JSON.stringify(v);

}

html+=`

<div class="row">

<div class="key">${esc(k)}</div>

<div class="value">${esc(v)}</div>

</div>

`;

});

addAI(

code+" ki complete registry detail:",

`

<div class="watch-card">

<div class="watch-title">
WATCH REGISTRY — ${esc(code)}
</div>

${html}

</div>

`

);

}

function send(){

let input=document.getElementById("input");

let command=input.value.trim();

if(!command)return;

addUser(command);

input.value="";

let m=command.match(

/^(.+?)\s+detail$/i

);

if(m){

showWatch(m[1]);

return;

}

addAI("Command format: WATCH-CODE DETAIL");

}

document.getElementById("input").addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

send();

}

});

</script>

</body>
</html>
