<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
background:#050505;
color:#fff;
font-family:Montserrat,Arial,sans-serif;
}

.arch-app{
width:100%;
height:100dvh;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at top right,rgba(190,150,65,.12),transparent 38%),
#070707;
}

/* HEADER */

.arch-header{
height:64px;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 22px;
border-bottom:1px solid rgba(210,174,91,.25);
}

.arch-brand{
display:flex;
align-items:center;
gap:10px;
}

.arch-logo{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #c9a65a;
border-radius:50%;
color:#d8b568;
font-family:Cinzel,serif;
}

.arch-name{
color:#d8b568;
font-family:Cinzel,serif;
letter-spacing:2px;
font-size:16px;
}

.arch-sub{
color:#777;
font-size:7px;
letter-spacing:1px;
}

.arch-online{
display:flex;
align-items:center;
gap:12px;
font-size:10px;
}

.listening-indicator{
display:inline-flex;
align-items:center;
gap:6px;
padding:4px 10px;
border-radius:20px;
background:rgba(201, 109, 109, 0.15);
border:1px solid rgba(255, 77, 77, 0.4);
color:#ff6b6b;
font-size:9px;
font-weight:600;
letter-spacing:1px;
animation:pulse 1.8s infinite;
}

.listening-indicator span{
width:7px;
height:7px;
border-radius:50%;
background:#ff4d4d;
box-shadow:0 0 8px #ff4d4d;
}

@keyframes pulse {
0%{ opacity: 0.7; }
50%{ opacity: 1; }
100%{ opacity: 0.7; }
}

#micErrorBanner {
display:none;
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
z-index:99999;
background:#8b0000;
color:#fff;
padding:8px 16px;
border-radius:8px;
border:1px solid #ff4d4d;
font-size:11px;
font-weight:600;
cursor:pointer;
box-shadow:0 0 15px rgba(255, 0, 0, 0.6);
letter-spacing:1px;
}

.db-status{
color:#cdb16d;
font-size:8px;
}

.db-status span{
width:7px;
height:7px;
display:inline-block;
margin-right:5px;
border-radius:50%;
background:#c9a653;
box-shadow:0 0 10px #c9a653;
}

/* CHAT */

.chat-area{
flex:1;
min-height:0;
overflow-y:auto;
padding:22px;
}

.chat-area::-webkit-scrollbar{
width:4px;
}

.chat-area::-webkit-scrollbar-thumb{
background:#94783e;
}

.message{
width:100%;
max-width:1200px;
margin:0 auto 16px;
display:flex;
gap:9px;
}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.avatar{
width:30px;
height:30px;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #a78645;
border-radius:50%;
color:#d8b568;
font-family:Cinzel,serif;
font-size:10px;
}

.bubble{
max-width:calc(100% - 40px);
padding:13px 16px;
border-radius:16px;
font-size:12px;
line-height:1.5;
overflow-wrap:anywhere;
}

.ai .bubble{
width:100%;
background:#111;
border:1px solid rgba(205,177,109,.18);
border-top-left-radius:4px;
}

.user .bubble{
max-width:420px;
background:linear-gradient(135deg,#a8833d,#d7b86d);
color:#080808;
border-top-right-radius:4px;
}

/* COMMANDS */

.command-title{
margin-bottom:10px;
color:#d8b568;
font-family:Cinzel,serif;
font-size:10px;
letter-spacing:1px;
}

.quick-hint{
margin-bottom:10px;
color:#777;
font-size:9px;
}

.quick-commands{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.quick-commands button{
min-height:42px;
padding:8px;
border:1px solid rgba(205,177,109,.28);
border-radius:8px;
background:#151515;
color:#d8b568;
cursor:pointer;
font-size:9px;
font-family:Montserrat;
transition:.2s;
}

.quick-commands button:hover{
background:#292116;
border-color:#d8b568;
}

/* DATA */

.data-card{
width:100%;
margin-top:12px;
padding:11px;
border:1px solid rgba(205,177,109,.25);
border-left:2px solid #c8a653;
border-radius:9px;
background:#101010;
}

.data-row{
display:flex;
align-items:flex-start;
gap:8px;
padding:7px 0;
border-bottom:1px solid rgba(255,255,255,.05);
font-size:11px;
line-height:1.5;
overflow-wrap:anywhere;
word-break:break-word;
}

.data-row:last-child{
border-bottom:0;
}

.data-key{
min-width:125px;
color:#8c8c8c;
}

.data-value{
color:#e1c477;
overflow-wrap:anywhere;
word-break:break-word;
}

/* DETAIL BOX */

.active-voucher-box{
width:100%;
margin-top:14px;
border:1px solid rgba(205,177,109,.28);
border-radius:10px;
overflow:hidden;
background:#0b0b0b;
}

.active-voucher-title{
padding:13px 16px;
color:#d8b568;
font-family:Cinzel,serif;
font-size:11px;
letter-spacing:1px;
border-bottom:1px solid rgba(205,177,109,.18);
background:#121212;
}

.voucher-row{
width:100%;
min-height:48px;
display:grid;
grid-template-columns:minmax(180px,30%) minmax(0,1fr);
align-items:center;
gap:20px;
padding:8px 14px;
border-bottom:1px solid rgba(255,255,255,.06);
}

.voucher-row:last-child{
border-bottom:0;
}

.voucher-detail{
color:#888;
font-size:10px;
text-transform:uppercase;
letter-spacing:.5px;
}

.voucher-value-box{
min-width:0;
width:100%;
padding:9px 12px;
border:1px solid rgba(205,177,109,.18);
border-radius:6px;
background:#151515;
color:#dfc477;
font-size:11px;
overflow-wrap:anywhere;
word-break:break-word;
}

/* REQUEST */

.request-card{
margin-top:13px;
padding:12px;
border:1px solid rgba(205,177,109,.34);
border-radius:12px;
background:#0e0e0e;
}

.request-title{
margin-bottom:9px;
color:#d8b568;
font-family:Cinzel,serif;
font-size:11px;
letter-spacing:1px;
}

.request-buttons{
display:flex;
gap:8px;
margin-top:12px;
}

.request-btn{
flex:1;
padding:11px 8px;
border:0;
border-radius:8px;
cursor:pointer;
font-size:10px;
font-weight:700;
}

.approve-btn{
background:linear-gradient(135deg,#a8833d,#d8b568);
color:#080808;
}

.no-approve-btn{
background:#202020;
border:1px solid #555;
color:#aaa;
}

/* COINS */

.coin-tools{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.coin-btn{
flex:1;
min-width:110px;
padding:10px;
border:1px solid rgba(205,177,109,.3);
border-radius:8px;
background:#161616;
color:#d8b568;
cursor:pointer;
font-size:10px;
}

.input-area{
flex-shrink:0;
padding:10px 22px 16px;
border-top:1px solid rgba(210,174,91,.2);

.input-box{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
gap:8px;
padding:6px 7px 6px 15px;
border:1px solid rgba(210,174,91,.35);
border-radius:28px;
background:#121212;
}

.input-box input{
flex:1;
min-width:0;
border:0;
outline:0;
background:transparent;
color:white;
font-family:Montserrat;
font-size:12px;
}

.input-box input::placeholder{
color:#777;
}

.send-btn{
width:38px;
height:38px;
border:0;
border-radius:50%;
cursor:pointer;
background:linear-gradient(135deg,#a8833d,#d8b568);
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

/* LOCK */

#archLock{
position:fixed;
inset:0;
z-index:999999;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at center,rgba(190,150,65,.12),transparent 42%),
#050505;
}

.lock-card{
width:min(380px,calc(100% - 34px));
padding:34px 25px;
text-align:center;
border:1px solid rgba(205,177,109,.35);

.lock-logo{

height:62px;

display:flex;
align-items:center;
justify-content:center;
border:1px solid #c9a65a;
border-radius:50%;
color:#d8b568;
font-family:Cinzel,serif;
font-size:22px;

.lock-title{
margin-top:17px;
color:#d8b568;
font-family:Cinzel,serif;
letter-spacing:3px;
font-size:21px;
}

.lock-subtitle{
margin-top:6px;
margin-bottom:25px;
color:#777;
font-size:8px;
letter-spacing:1.5px;
}

.lock-card input{
width:100%;
height:45px;
padding:0 14px;
outline:none;
border:1px solid rgba(205,177,109,.28);
border-radius:8px;
background:#151515;
color:white;
font-family:Montserrat;
}

.lock-card input:focus{
border-color:#d8b568;
}

.lock-card button{
width:100%;
height:45px;
margin-top:12px;
border:0;
border-radius:8px;
cursor:pointer;
background:linear-gradient(135deg,#a8833d,#d8b568);
color:#080808;
font-weight:700;
font-size:10px;
}

#lockError{
min-height:17px;
margin-top:12px;
color:#c96d6d;
font-size:9px;
}

/* MOBILE */

@media(max-width:650px){

.arch-header{
height:58px;
padding:0 10px;
}

.arch-logo{
width:34px;
height:34px;

}

.arch-name{
font-size:13px;
}

.arch-sub{
font-size:5px;
}

.arch-online{
font-size:6px;
gap:6px;
}

.listening-indicator{
padding:2px 6px;
font-size:7px;
}

.chat-area{
padding:13px 7px;
}

.message{
gap:5px;
}

.bubble{
max-width:calc(100% - 34px);
padding:10px;
font-size:10px;
}

.quick-commands{
grid-template-columns:repeat(2,1fr);
gap:6px;
}

.quick-commands button{
min-height:38px;
font-size:8px;
}

.data-row{
display:block;
padding:6px 0;
font-size:10px;
}

.data-key{
display:block;
min-width:0;
margin-bottom:2px;
font-size:9px;
}

.data-value{
display:block;
font-size:10px;
word-break:break-all;
}

.voucher-row{
min-height:auto;
display:grid;
grid-template-columns:minmax(0,42%) minmax(0,58%);
gap:5px;
padding:7px;
}

.voucher-detail{
font-size:7px;
line-height:1.3;
}

.voucher-value-box{
padding:7px;
font-size:8px;
line-height:1.3;
}

.request-buttons{
flex-direction:column;
}

.request-btn{
width:100%;
}

.coin-tools{
display:grid;
grid-template-columns:1fr;
}

.coin-btn{
width:100%;
min-width:0;
}

.input-area{
padding:7px;
}

.input-box{
padding:5px 6px 5px 11px;
}

.send-btn{
width:34px;
height:34px;
}

}
</style>
</head>

/* ================= VOICE SPEAKING REMOVED (SILENT EXECUTION) ================= */

function stopSpeaking() {

/* ================= ESCAPE ================= */

function escapeHTML(value){

return String(value ?? "N/A")

.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}


/* ================= SCROLL ================= */

function scrollChat(){

const chat =
document.getElementById("chatArea");

chat.scrollTop = chat.scrollHeight;

}


/* ================= USER MESSAGE ================= */

function addUserMessage(text){

const div=document.createElement("div");

div.className="message user";

div.innerHTML=`

<div class="bubble">
${escapeHTML(text)}
</div>

`;

document.getElementById("chatArea").appendChild(div);

scrollChat();

}


/* ================= AI MESSAGE ================= */

function addAIMessage(text,html=""){

const div=document.createElement("div");

div.className="message ai";

div.innerHTML=`

<div class="avatar">A</div>

<div class="bubble">

${escapeHTML(text)}

${html}

</div>

`;

document.getElementById("chatArea").appendChild(div);

scrollChat();

}


/* ================= QUICK COMMAND ================= */

function quickCommand(type){

const input =
document.getElementById("commandInput");

const value=input.value.trim();

if(!value){

input.focus();

input.placeholder=
"Pehle user ya watch code likho...";

return;

}

if(type==="data")
input.value=value+" user ka data";

if(type==="voucher")
input.value=value+" user ka voucher";

if(type==="pending")
input.value=value+" user ki pending request";

if(type==="coins")
input.value=value+" user ke coins";

if(type==="watch")
input.value=value+" detail";

input.focus();

}


/* ================= FIND USER ================= */

function findUser(name){

const search=name.toLowerCase().trim();

const users=Object.keys(liveUsers);

const exact=users.find(

user=>user.toLowerCase()===search

);

if(exact)return exact;

const similar=users.find(

user=>user.toLowerCase().includes(search)

);

return similar || null;

}


/* ================= COMMAND ENGINE ================= */

function sendCommand(){
    

const input=
document.getElementById("commandInput");

const command=input.value.trim();

if(!command)return;

addUserMessage(command);

input.value="";

let match;


/* 1. GREETINGS */

if (/^(hi|hello|hello\s+bro|hi\s+bhai|hello\s+bhai|hi\s+bro)$/i.test(command)) {

    const variations = [
        "Haan bhai, bolo! ARCH-V ekdum ready hai. Kiska data dekhna hai ya manage karna hai?",
        "Hey! Sab mast? Bataiye aaj database me kya task complete karna hai?",
        "Bolo brother! Direct batao kis user par work karna hai, main handle kar leta hoon.",
        "Haan sir, main fully active hoon. Bataiye kiska details fetch karna hai?"
    ];
    
    const randomIndex = Math.floor(Math.random() * variations.length);
    addAIMessage(variations[randomIndex]);
    return;
}


/* 2. CASUAL ROUTERS */

if (/^(kesa\s+he|kese\s+ho)$/i.test(command)) {
    addAIMessage("Main ekdum badhiya hoon bhai! Aap batao, aaj kiska database handle karein?");
    return;
}

// Ky ker rha he / Ky hua
if (/^(ky\s+ker\s+rha\s+he|ky\s+hua)$/i.test(command)) {
    addAIMessage("kuch nai chief hub ka firebase data read ker rha hu");
    return;
}

// Identity query commands
if (/^(kon\s+he\s+tu|tuje\s+kisne\s+benaya\s+or\s+kuy|ky\s+kerte\s+ho\s+tum|ky\s+kaam\s+he\s+tumahra)$/i.test(command)) {
    addAIMessage("me arch-v hu muje chief company ke owner Mr Chandar Mohan devara unka busniss ka data manage kerne edit kerne or read kerne ke liy benaya gya he mere alava Mr Chandar Mohan ne 3 or Ai assitance ka nirmaan kiya he jo aleg aleg kaam shmbalte he");
    return;
}

// Mood and Status Updates (accha hu, bediya hu, etc.)
if (/^(accha\s+hu|bediya\s+hu|sb\s+thik\s+he|kerab\s+he|me\s+bi\s+bediya\s+hu|thik\s+nai\s+hu|me\s+bediya\s+hu|ek\s+number\s+hu|ek\s+number|bhot\s+bediya|bhot\s+kush|bediya)$/i.test(command)) {
    addAIMessage("Thanks betane ke liy betaiye aap kis baat pe cercha kerna chate ho kiska data manage kerna he");
    return;
}

// Casual Triggers (or suna, or bta, etc.)
if (/^(or\s+suna|or\s+bta|or\s+bol|tu\s+bta|tu\s+suna|or\s+kuch\s+bta)$/i.test(command)) {
    addAIMessage("me bediya hu betao aapko kiska data manage kerna he");
    return;
}

// Owner Queries (owner kon he, malik kon he, etc.)
if (/^(owner\s+kon\s+he|who\s+is\s+owner|malik\s+kon\s+he|chief\s+ka\s+malik\s+kon\s+he|chief\s+ka\s+owner\s+kon\s+he|chief\s+company\s+ka\s+malik\s+kon\s+he|chief\s+company\s+ka\s+owner\s+kon\s+he)$/i.test(command)) {
    addAIMessage("chief company ke malik Mr Chandar Mohan he");
    return;

async function changeCoins(encodedUsername,type){

const username=decodeURIComponent(encodedUsername);

liveUsers[username]?.coins || 0
);

const input=prompt(

type==="set"
?"New coin value:"
:type==="increase"
?"Kitne coins increase karne hain?"
:"Kitne coins decrease karne hain?"

);

if(input===null)return;

const amount=Number(input);

if(isNaN(amount)||amount<0){

alert("Valid number enter karo.");

if(type==="set")
newValue=amount;

else if(type==="increase")
newValue=current+amount;

else
newValue=Math.max(0,current-amount);

await db.ref(
"users/"+username+"/coins"
).set(newValue);

addAIMessage(

"Coins update ho gaye hain. User: "+username+" New Value: "+newValue

);

}

/* ================= AUTOMATIC ALWAYS-ON VOICE ENGINE ================= */

let recognition;

function initAutoVoice() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        console.log("Web Speech API not supported.");
        document.getElementById("voiceStatus").innerText = "MIC NOT SUPPORTED";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US'; // Pure English transcription

    recognition.onstart = function() {
        console.log("ARCH-V Voice Auto-ON");
        document.getElementById("voiceStatus").style.display = "inline-flex";
    };

    recognition.onresult = function(event) {
        const lastIndex = event.results.length - 1;
        let transcript = event.results[lastIndex][0].transcript;
        
        transcript = transcript.replace(/\./g, '').trim();

        if (transcript) {
            console.log("Voice Captured:", transcript);
            const input = document.getElementById("commandInput");
            input.value = transcript;
            sendCommand();
        }
    };

    recognition.onerror = function(event) {
        console.error("Speech Recognition Error:", event.error);
    };

    recognition.onend = function() {
        // Continuous restart so mic remains active
        try {
            recognition.start();
        } catch(e) {
            setTimeout(() => { recognition.start(); }, 1000);
        }
    };

    try {
        recognition.start();
    } catch(e) {
        console.log("Auto-start error:", e);
    }
}

</script>

</body>
</html>
