/* ================= TEXT TO SPEECH ENGINE (PERFECT HINGLISH + ENGLISH) ================= */

function stopSpeaking() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
    }
}

function speakText(text) {
    stopSpeaking(); // Purana speech instant stop karo

    if (!('speechSynthesis' in window)) return;

    let cleanText = text.replace(/<[^>]*>?/gm, '');
    cleanText = cleanText.replace(/[*_#]/g, '').trim();

    if (!cleanText) return;

    const utterance = new SpeechSynthesisUtterance(cleanText);

    // Dynamic Voice Settings for Ultra-Clear Hinglish/English
    utterance.lang = 'en-IN'; // Indian Accent for natural English & Hinglish mixture
    utterance.rate = 1.15;    // High speed but clear
    utterance.pitch = 1.0;

    const voices = window.speechSynthesis.getVoices();
    
    // Auto-select Best Indian English / Natural Speech Voice
    const selectedVoice = voices.find(v => 
        (v.lang === 'en-IN' || v.lang === 'hi-IN') && 
        (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('India'))
    ) || voices.find(v => v.lang === 'en-IN');

    if (selectedVoice) {
        utterance.voice = selectedVoice;
    }

    window.speechSynthesis.speak(utterance);
}

if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };
}


/* ================= ESCAPE ================= */

function escapeHTML(value){

return String(value ?? "N/A")

.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}


/* ================= SCROLL ================= */

function scrollChat(){

const chat =
document.getElementById("chatArea");

chat.scrollTop = chat.scrollHeight;

}


/* ================= USER MESSAGE ================= */

function addUserMessage(text){

const div=document.createElement("div");

div.className="message user";

div.innerHTML=`

<div class="bubble">
${escapeHTML(text)}
</div>

`;

document.getElementById("chatArea").appendChild(div);

scrollChat();

}


/* ================= AI MESSAGE ================= */

function addAIMessage(text,html=""){

speakText(text);

const div=document.createElement("div");

div.className="message ai";

div.innerHTML=`

<div class="avatar">A</div>

<div class="bubble">

${escapeHTML(text)}

${html}

</div>

`;

document.getElementById("chatArea").appendChild(div);

scrollChat();

}


/* ================= QUICK COMMAND ================= */

function quickCommand(type){

const input =
document.getElementById("commandInput");

const value=input.value.trim();

if(!value){

input.focus();

input.placeholder=
"Pehle user ya watch code likho...";

return;

}

if(type==="data")
input.value=value+" user ka data";

if(type==="voucher")
input.value=value+" user ka voucher";

if(type==="pending")
input.value=value+" user ki pending request";

if(type==="coins")
input.value=value+" user ke coins";

if(type==="watch")
input.value=value+" detail";

input.focus();

}


/* ================= FIND USER ================= */

function findUser(name){

const search=name.toLowerCase().trim();

const users=Object.keys(liveUsers);

const exact=users.find(

user=>user.toLowerCase()===search

);

if(exact)return exact;

const similar=users.find(

user=>user.toLowerCase().includes(search)

);

return similar || null;

}


/* ================= COMMAND ENGINE ================= */

function sendCommand(){

const input=
document.getElementById("commandInput");

const command=input.value.trim();

if(!command)return;

addUserMessage(command);

input.value="";

let match;


/* 1. GREETINGS RANDOMIZER MATCH */

if (/^(hi|hello|hello\s+bro|hi\s+bhai|hello\s+bhai|hi\s+bro)$/i.test(command)) {

    const variations = [
        "Kese ho dear sir, bataiye me aapki kese meded ker sekta hu? Aaj kiska data handle kerna he ya kuch new add kerna he?",
        "Hello sir, kaise hain aap? ARCH-V system ready hai. Bataiye, aaj kis user ka data check karna hai ya koi naya code add karna hai?",
        "Welcome back, dear sir! Sab badhiya? Bataiye aaj database me kya operation handle karna hai ya kuch naya deploy karna hai?",
        "Hi sir, system fully synchronized hai. Kaise hain aap? Bataiye aaj kiska data scan ya modify karna hai?",
        "Hello brother! Kaise ho dear sir? Main ekdum ready hoon, bataiye aaj kiska data handle karna hai ya system me kya naya add karein?"
    ];
    
    const randomIndex = Math.floor(Math.random() * variations.length);
    addAIMessage(variations[randomIndex]);
    return;
}


/* 2. DYNAMIC CASUAL TALK ROUTERS */

if (/^(kesa\s+he|kese\s+ho)$/i.test(command)) {
    addAIMessage("Me thik hu aap betao kese ho kika database handle kerna he aaj");
    return;
}


if (/^(user\s+ka\s+data\s+bta|user\s+ki\s+detail\s+bta|user\s+ka\s+voucher\s+bta|user\s+ki\s+voucher\s+detail\s+bta|user\s+ki\s+pending\s+request\s+bta|user\s+ki\s+reqest\s+bta|data\s+bta|detail\s+bta|voucher\s+bta|request\s+bta|coin\s+bta|user\s+ke\s+coin\s+bta|watch\s+detail\s+bta|user\s+ki\s+watch\s+detail\s+bta|user\s+ka\s+name\s+bta|name\s+bta)$/i.test(command)) {
    addAIMessage("aap jis bi user ka data chate he uska id name betaye fir me aapko uska current data bta paunga jo aapne muj se abi pucha");
    return;
}

  

/* 3. CORE FIREBASE OPERATIONS */

/* USER DATA */

match=command.match(
/^(.+?)\s+user\s+ka\s+data$/i
);

if(match){

showUserData(match[1],false);

return;

}


/* FULL DATA */

match=command.match(

/* ================= APPROVE ================= */

async function approveUserRequest(searchName){

const username=findUser(searchName);

if(!username){

addAIMessage("User nahi mila.");

return;

}

const request=
liveUsers[username]?.pendingRequest;

if(!request){

addAIMessage(
username+" ki koi pending request nahi hai."
);

return;

}

if(request.status!=="pending"){

addAIMessage(
username+" ki request already "+request.status+" hai."
);

return;

}

try{

await db.ref(
"users/"+username+"/pendingRequest/status"
).set("approved");

addAIMessage(

"Request approve ho gayi hai user "+username+" ki."

);

}catch(error){

addAIMessage(
"Firebase update failed."
);

}

}

return `

<button
class="coin-btn"

>
INCREASE COINS
</button>

<button
class="coin-btn"

>
DECREASE COINS
</button>

<button
class="coin-btn"
onclick="changeCoins('${encodeURIComponent(username)}','set')"
>
SET COINS
</button>

</div>

`;

}


async function changeCoins(encodedUsername,type){

const username=decodeURIComponent(encodedUsername);

const current=Number(
liveUsers[username]?.coins || 0
);

const input=prompt(

type==="set"
?"New coin value:"
:type==="increase"
?"Kitne coins increase karne hain?"
:"Kitne coins decrease karne hain?"

);

if(input===null)return;

const amount=Number(input);

if(isNaN(amount)||amount<0){

alert("Valid number enter karo.");

return;

}

let newValue;

if(type==="set")
newValue=amount;

else if(type==="increase")
newValue=current+amount;

else
newValue=Math.max(0,current-amount);

await db.ref(
"users/"+username+"/coins"
).set(newValue);

addAIMessage(

"Coins update ho gaye hain. User: "+username+" New Value: "+newValue

);

}


async function setCoins(searchName,value){

const username=findUser(searchName);

if(!username){

addAIMessage("User nahi mila.");

return;

}

await db.ref(
"users/"+username+"/coins"
).set(value);

addAIMessage(

username+
" ke coins Firebase me "+
value+
" kar diye gaye hain."

);

}

/* ================= FORMAT WATCH ================= */

function formatWatchData(watch){

let html="";

Object.keys(watch).forEach(key=>{

let value=watch[key];

if(value!==null && typeof value==="object"){

value=JSON.stringify(value);

}

html+=`

<div class="voucher-row">

<div class="voucher-detail">
${escapeHTML(key)}
</div>

<div class="voucher-value-box">
${escapeHTML(value)}
</div>

</div>

`;

});

return html;

}


/* ================= FORMAT DATA ================= */

function formatData(obj){

if(obj===null||obj===undefined)return "";

if(typeof obj!=="object"){

return `

<div class="data-row">

<span class="data-value">
${escapeHTML(obj)}
</span>

</div>

`;

}

let html="";

Object.keys(obj).forEach(key=>{

const value=obj[key];

if(value!==null && typeof value==="object"){

html+=`

<div class="data-row">

<span class="data-key">
${escapeHTML(key)}
</span>

<div class="data-value">
${formatData(value)}
</div>

</div>

`;

}else{

html+=`

<div class="data-row">

<span class="data-key">
${escapeHTML(key)}
</span>

<span class="data-value">
${escapeHTML(value)}
</span>

</div>

`;

}

});

return html;

}


/* ================= FORMAT VOUCHER ================= */

function formatVoucherObject(voucher){

let html="";

Object.keys(voucher).forEach(key=>{

let value=voucher[key];

if(value!==null && typeof value==="object"){

value=JSON.stringify(value);

}

html+=`

<div class="voucher-row">

<div class="voucher-detail">
${escapeHTML(key)}
</div>

<div class="voucher-value-box">
${escapeHTML(value)}
</div>

</div>

`;

});

return html;

}


/* ================= AUTOMATIC ALWAYS-ON VOICE ENGINE WITH INTERRUPT ================= */

let recognition;
let isMicActive = false;

function startMicSafely() {
    if (!recognition) return;
    try {
        document.getElementById("micErrorBanner").style.display = "none";
        recognition.start();
        isMicActive = true;
    } catch (e) {
        // Mic is already active
    }
}

function initAutoVoice() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("voiceStatus").innerText = "MIC NOT SUPPORTED";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true; // Enabled for instant voice interruption
    recognition.lang = 'en-US'; 

    recognition.onstart = function() {
        isMicActive = true;
        document.getElementById("voiceStatus").style.display = "inline-flex";
        document.getElementById("micErrorBanner").style.display = "none";
    };

    recognition.onspeechstart = function() {
        // SMART INTERRUPT: User ne jaise hi bolna shuru kiya, AI ki aawaz FAURAN STOP ho jayegi
        // Data screen se DILUTE nahi hoga!
        stopSpeaking();
    };

    recognition.onresult = function(event) {
        const lastIndex = event.results.length - 1;

        if (event.results[lastIndex].isFinal) {
            let transcript = event.results[lastIndex][0].transcript;
            transcript = transcript.replace(/\./g, '').trim();

            if (transcript) {
                const input = document.getElementById("commandInput");
                input.value = transcript;
                sendCommand();
            }
        }
    };

    recognition.onerror = function(event) {
        console.error("Mic Error:", event.error);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
            document.getElementById("micErrorBanner").style.display = "block";
        }
    };

    recognition.onend = function() {
        isMicActive = false;
        if (!document.hidden) {
            setTimeout(() => { startMicSafely(); }, 400);
        }
    };

    startMicSafely();

    document.addEventListener("visibilitychange", function() {
        if (!document.hidden) {
            startMicSafely();
        }
    });

    window.addEventListener("focus", function() {
        startMicSafely();
    });

}
