<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARCH Command Center</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
}

body{

font-family:Montserrat,Arial,sans-serif;

background:

radial-gradient(
circle at 50% -10%,
rgba(210,175,95,.16),
transparent 38%
),

radial-gradient(
circle at 0% 100%,
rgba(150,110,40,.08),
transparent 35%
),

#050505;

color:#fff;

}

/* MAIN */

.container{

width:100%;
height:100vh;

display:flex;
flex-direction:column;

overflow-y:auto;
scrollbar-width:none;

}

.container::-webkit-scrollbar{
display:none;
}

/* HEADER */

header{

padding:34px 6% 22px;

text-align:center;

}

.logo{

width:68px;
height:68px;

margin:auto;

display:flex;
align-items:center;
justify-content:center;

border:1px solid rgba(216,181,104,.7);

border-radius:50%;

font-family:Cinzel;

font-size:25px;

color:#d8b568;

box-shadow:

0 0 25px rgba(216,181,104,.12),

inset 0 0 20px rgba(216,181,104,.05);

}

h1{

margin-top:18px;

font-family:Cinzel;

font-size:28px;

font-weight:600;

letter-spacing:7px;

color:#d8b568;

}

.subtitle{

margin-top:8px;

font-size:9px;

letter-spacing:4px;

color:#777;

text-transform:uppercase;

}

/* LINE */

.line{

width:90px;
height:1px;

margin:22px auto 0;

background:

linear-gradient(
90deg,
transparent,
#d8b568,
transparent
);

}

/* AGENT GRID */

.agents{

width:88%;

max-width:1100px;

margin:25px auto 40px;

display:grid;

grid-template-columns:

repeat(2,1fr);

gap:18px;

}

/* CARD */

.agent{

position:relative;

min-height:220px;

padding:28px 24px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

background:

linear-gradient(
145deg,
rgba(255,255,255,.045),
rgba(255,255,255,.012)
);

border:1px solid rgba(216,181,104,.18);

border-radius:18px;

overflow:hidden;

transition:

transform .3s ease,

border-color .3s ease,

box-shadow .3s ease;

}

.agent::before{

content:"";

position:absolute;

width:160px;
height:160px;

top:-80px;
right:-80px;

border-radius:50%;

background:

radial-gradient(
circle,
rgba(216,181,104,.13),
transparent 70%
);

}

.agent:hover{

transform:translateY(-6px);

border-color:

rgba(216,181,104,.7);

box-shadow:

0 15px 40px rgba(0,0,0,.5),

0 0 25px rgba(216,181,104,.08);

}

/* AGENT ICON */

.agent-icon{

width:58px;
height:58px;

display:flex;
align-items:center;
justify-content:center;

border:1px solid rgba(216,181,104,.5);

border-radius:50%;

font-family:Cinzel;

font-size:20px;

color:#d8b568;

margin-bottom:17px;

}

/* NAME */

.agent-name{

font-family:Cinzel;

font-size:19px;

letter-spacing:3px;

color:#d8b568;

}

/* ROLE */

.agent-role{

min-height:32px;

margin-top:9px;

font-size:9px;

line-height:1.6;

letter-spacing:1px;

color:#8b8b8b;

text-transform:uppercase;

}

/* BUTTON */

.access{

margin-top:20px;

padding:11px 25px;

border:1px solid rgba(216,181,104,.55);

border-radius:7px;

background:

linear-gradient(
135deg,
rgba(216,181,104,.12),
rgba(216,181,104,.03)
);

color:#d8b568;

font-size:9px;

font-weight:600;

letter-spacing:1.5px;

cursor:pointer;

transition:.25s;

}

.access:hover{

background:#d8b568;

color:#080808;

box-shadow:

0 0 18px rgba(216,181,104,.25);

}

/* FOOTER */

footer{

margin-top:auto;

padding:18px;

text-align:center;

font-size:8px;

letter-spacing:2px;

color:#555;

}

/* MOBILE */

@media(max-width:700px){

html,
body{
overflow:auto;
}

.container{
min-height:100vh;
height:auto;
}

header{
padding-top:28px;
}

h1{
font-size:23px;
letter-spacing:5px;
}

.agents{

grid-template-columns:1fr;

width:90%;

}

.agent{
min-height:205px;
}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
A
</div>

<h1>ARCH</h1>

<div class="subtitle">
Artificial Command &amp; Response Hub
</div>

<div class="line"></div>

</header>


<section class="agents">


<!-- ARCH-V -->

<div class="agent">

onclick="openAgent('ARCH-V')">

<!-- ARCH-1 -->

</div>

<div class="agent-role">

</div>

class="access"
onclick="openAgent('ARCH-1')">

ACCESS AGENT

<!-- ARCH-2 -->

<div class="agent-name">

</div>

<button

onclick="openAgent('ARCH-2')">

ACCESS AGENT

</button>

</div>


<!-- ARCH-3 -->

<div class="agent">

<div class="agent-icon">
3
</div>

<div class="agent-name">
ARCH-3
</div>

<div class="agent-role">
AI Assistance for Watch Verification
</div>

<button
class="access"
onclick="openAgent('ARCH-3')">

ACCESS AGENT

</button>

</div>


</section>


<footer>

ARCH COMMAND CENTER • AUTHORIZED ACCESS ONLY

</footer>

</div>

</script>

</body>
</html>
